<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diurno — Seu planner pessoal</title>
  <meta name="description" content="Diurno é um app de planner pessoal: agenda, hábitos, metas, rotinas, finanças e notas, no seu estilo." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #FFF8F0;
      color: #3D2B2B;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container { max-width: 640px; text-align: center; }

    .logo-flower { width: 88px; height: 88px; margin-bottom: 1.25rem; }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #B87878;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
    }

    .tagline { font-size: 1.1rem; color: #8A6060; margin-bottom: 2rem; }

    .desc { font-size: 1rem; margin-bottom: 2.5rem; }

    .links { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; }

    .links a {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .links a:hover { opacity: 0.8; }

    .primary { background: #D4A0A0; color: #fff; }
    .secondary { background: #fff; color: #B87878; border: 1px solid #E8D5C8; }

    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #B09090;
    }

    footer a { color: #B09090; }
  </style>
</head>
<body>
  <div class="container">
    <svg class="logo-flower" viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">
      <rect width="108" height="108" fill="#D4A0A0" rx="22"/>
      <path fill="#fff" d="M54,66 Q51,76 54,88 Q57,76 54,66 Z"/>
      <path fill="#fff" d="M54,56 Q50,41 54,30 Q58,41 54,56 Z"/>
      <path fill="#fff" d="M54,56 Q69,52 80,56 Q69,60 54,56 Z"/>
      <path fill="#fff" d="M54,56 Q39,52 28,56 Q39,60 54,56 Z"/>
      <path fill="#fff" d="M54,56 Q63,43 70,35 Q65,47 54,56 Z"/>
      <path fill="#fff" d="M54,56 Q45,43 38,35 Q43,47 54,56 Z"/>
      <circle cx="54" cy="56" r="7" fill="#FFD0D0"/>
      <circle cx="54" cy="56" r="3" fill="#fff"/>
    </svg>

    <h1>Diurno</h1>
    <p class="tagline">Seu planner pessoal, do seu jeito.</p>

    <p class="desc">
      Agenda, hábitos, metas, rotinas, finanças, listas e notas — reunidos num app
      que funciona offline e guarda seus dados no seu aparelho.
    </p>

    <div class="links">
      <a class="primary" href="https://docs.diurno.app">Documentação</a>
      <a class="secondary" href="/privacidade">Política de Privacidade</a>
    </div>

    <footer>
      <p>&copy; 2026 Diurno &middot; <a href="mailto:diurno.app@gmail.com">diurno.app@gmail.com</a></p>
    </footer>
  </div>
</body>
</html>
